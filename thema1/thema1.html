<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokemon Karten</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
</head>
<body>

  <div class="sidebar">
  <div class="sidebar-top">
    <h2>Navigation</h2>
    <a href="../index.html">Startseite</a>
    <a href="thema1.html">Pokemon Karten</a>
    <a href="../thema2/thema2.html">Top Smartphone-Games</a>
  </div>

  <div class="sidebar-bottom">
    <a href="../impressum.html" class="impressum-link">Impressum</a>
  </div>
</div>

  

  <div class="main-content">
    <!-- EINZIGES FRAME für Ticker + Artikel -->
    <iframe class="content-frame" src="thema1-content.html" scrolling="no"></iframe> 
    

    <div style="position: relative; margin-bottom: 20px;">
    <!-- Refresh Button -->
    <button id="refreshBtn" style="position: absolute; top: 0; right: 0; z-index: 10; padding: 5px 10px;">
    🔄 Refresh
    </button>

    <!-- IFrame -->
    <iframe id="myFrame" class="content-frame" src="thema1-content.html" scrolling="no" style="width:100%; height:500px; border:1px solid #ccc;"></iframe>
    </div>
    
    
    <!-- SEPARATES FRAME für Kommentare -->
    <iframe class="comment-frame" src="thema1-comments.html" scrolling="no"></iframe>
  </div>

  <script>
    // Automatisches Resizing beider iframes
    function resizeIframe(iframe) {
      try {
        const height = iframe.contentWindow.document.body.scrollHeight;
        iframe.style.height = height + 'px';
      } catch(e) {}
    }

    const contentIframe = document.querySelector('.content-frame');
    const commentIframe = document.querySelector('.comment-frame');

    contentIframe.onload = () => {
      resizeIframe(contentIframe);
      setTimeout(() => resizeIframe(contentIframe), 500);
      setTimeout(() => resizeIframe(contentIframe), 1500);
      setTimeout(() => resizeIframe(contentIframe), 3000);
    }

    commentIframe.onload = () => {
      resizeIframe(commentIframe);
      setTimeout(() => resizeIframe(commentIframe), 500);
      setTimeout(() => resizeIframe(commentIframe), 1500);
      setTimeout(() => resizeIframe(commentIframe), 3000);
    }

    const iframe = document.getElementById('myFrame');
    const button = document.getElementById('refreshBtn');

    button.addEventListener('click', () => {
      iframe.src = iframe.src; // lädt das IFrame neu
    });

  </script>

</body>
</html>
